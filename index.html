  <!-- Landing Page -->
  <div id="landing" class="page">
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
      <svg class="icon"><use href="#icon-sun"/></svg>
    </button>
    
    <div class="hero">
      <div class="logo">
        <svg class="icon-lg"><use href="#icon-globe"/></svg>
      </div>
      <h1>eSIM Travel</h1>
      <p class="tagline">Travel SIM &amp; Adventures</p>
      <p class="desc">International eSIM data plans, tours, hotels, and flights — all in one travel companion app</p>
      
      <div class="features">
        <div class="feature">
          <svg class="icon"><use href="#icon-sim"/></svg>
          <span>eSIM</span>
        </div>
        <div class="feature">
          <svg class="icon"><use href="#icon-map"/></svg>
          <span>Tours</span>
        </div>
        <div class="feature">
          <svg class="icon"><use href="#icon-hotel"/></svg>
          <span>Hotels</span>
        </div>
        <div class="feature">
          <svg class="icon"><use href="#icon-airplane"/></svg>
          <span>Flights</span>
        </div>
      </div>
      
      <button class="btn-primary" onclick="openApp()">
        Open Demo
        <svg class="icon"><use href="#icon-arrow"/></svg>
      </button>
      
      <p class="note">This is a demo prototype &bull; Works offline</p>
    </div>
  </div>

  <!-- Mobile App -->
  <div id="app" class="page hidden">
    <div class="phone-frame">
      <div class="phone-header">
        <span class="status-bar"></span>
        <button class="theme-toggle-small" onclick="toggleTheme()">
          <svg class="icon-sm"><use href="#icon-sun"/></svg>
        </button>
      </div>
      
      <div class="app-header">
        <button class="back-btn hidden" onclick="goBack()" id="backBtn">
          <svg class="icon"><use href="#icon-arrow-left"/></svg>
        </button>
        <h2 id="appTitle">Home</h2>
        <div class="header-actions">
          <button class="icon-btn" id="headerNotifBtn" onclick="showNotification('No new notifications')" title="Notifications">
            <svg class="icon"><use href="#icon-bell"/></svg>
          </button>
          <div class="profile-icon" onclick="showPage('profile')">
            <svg class="icon"><use href="#icon-user"/></svg>
          </div>
        </div>
      </div>
      
      <div class="app-content" id="content">
        <!-- Content injected by JS -->
      </div>
      
      <div class="bottom-nav" id="bottomNav">
        <button class="nav-item active" onclick="showPage('home', this)">
          <svg class="icon-nav"><use href="#icon-home"/></svg>
          <span>Home</span>
        </button>
        <button class="nav-item" onclick="showPage('esim', this)">
          <svg class="icon-nav"><use href="#icon-sim"/></svg>
          <span>eSIM</span>
        </button>
        <button class="nav-item" onclick="showPage('tours', this)">
          <svg class="icon-nav"><use href="#icon-map"/></svg>
          <span>Tours</span>
        </button>
        <button class="nav-item" onclick="showPage('hotels', this)">
          <svg class="icon-nav"><use href="#icon-hotel"/></svg>
          <span>Hotels</span>
        </button>
        <button class="nav-item" onclick="showPage('profile', this)">
          <svg class="icon-nav"><use href="#icon-user"/></svg>
          <span>Profile</span>
        </button>
      </div>
    </div>
    
    <button class="btn-exit" onclick="closeApp()">Back to Home</button>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>
